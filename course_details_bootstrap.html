<h2>Congratulations!</h2>

<h4>Your Score: {{ score }} / {{ total }}</h4>

<table class="table">

<tr>
<th>Question</th>
<th>Your Answer</th>
<th>Status</th>
</tr>

{% for choice in choices %}

<tr>
<td>{{ choice.question.question_text }}</td>
<td>{{ choice.choice_text }}</td>

<td>
{% if choice.is_correct %}
Correct
{% else %}
Wrong
{% endif %}
</td>

</tr>

{% endfor %}

</table>
